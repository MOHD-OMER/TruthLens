{% extends 'base.html' %}
{% block title %}404 — TruthLens{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:3rem">
  <p style="font-family:var(--font-m);font-size:0.72rem;letter-spacing:0.15em;color:var(--muted);text-transform:uppercase;margin-bottom:1rem">Error 404</p>
  <h1 style="font-family:var(--font-h);font-size:5rem;font-weight:800;letter-spacing:-0.06em;color:var(--text);margin-bottom:0.5rem">Not Found</h1>
  <p style="color:var(--text-2);font-weight:300;margin-bottom:2rem">The page you're looking for doesn't exist.</p>
  <a href="{{ url_for('home') }}" class="btn btn-primary">Return Home</a>
</div>
{% endblock %}
