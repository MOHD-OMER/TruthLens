{% extends 'base.html' %}
{% block title %}Login — TruthLens{% endblock %}

{% block head %}
<style>
  .login-page {
    min-height: calc(100vh - 64px);
    display: flex; align-items: center; justify-content: center;
    padding: 3rem 2rem;
    position: relative;
  }

  .login-card {
    width: 100%; max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2.5rem;
    position: relative; z-index: 1;
  }

  .login-logo {
    font-family: var(--font-h);
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.04em;
    margin-bottom: 0.5rem;
  }

  .login-sub {
    font-family: var(--font-m);
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 2rem;
    letter-spacing: 0.06em;
  }

  .form-group { margin-bottom: 1.25rem; }

  label {
    display: block;
    font-family: var(--font-m);
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-2);
    margin-bottom: 0.5rem;
  }

  input[type=text], input[type=password] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-b);
    font-size: 0.92rem;
    padding: 0.75rem 1rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(232,255,60,0.08);
  }

  .bg-glow {
    position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.06; pointer-events: none;
  }
</style>
{% endblock %}

{% block content %}
<div class="login-page">
  <div class="bg-glow" style="width:600px;height:600px;background:var(--accent);top:-100px;left:50%;transform:translateX(-50%)"></div>

  <div class="login-card">
    <div class="login-logo">TruthLens</div>
    <p class="login-sub">ADMIN DASHBOARD ACCESS</p>

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="admin" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:0.85rem;margin-top:0.5rem">
        Sign In →
      </button>
    </form>

    <p style="margin-top:1.5rem;font-size:0.78rem;color:var(--muted);font-family:var(--font-m);text-align:center">
      Default: admin / admin123
    </p>
  </div>
</div>
{% endblock %}
